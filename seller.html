<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        /* ========== STYLES (same as before) ========== */
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; } 
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h2 { text-align: center; color: #1e3a8a; margin-bottom: 25px; }
        .section-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 15px; border-left: 5px solid #1e3a8a; padding-left: 10px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus, select:focus { border-color: #3b82f6; outline: none; }
        
        .file-upload { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; background: #f8fafc; color: #1e3a8a; font-weight: bold; }
        .file-upload:hover { border-color: #3b82f6; background: #eff6ff; }
        
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .preview-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .preview-img, .preview-video { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; border: 1px solid #ddd; background: #eee; display: none; }
        .preview-video { object-fit: cover; }

        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
        .btn-update { background: linear-gradient(135deg, #f59e0b, #d97706); } 
        .btn-cancel { background: #64748b; margin-top: 10px; display: none; }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; }
        th { background: #f8fafc; text-align: left; padding: 15px; color: #64748b; font-weight: 700; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .thumb-small { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge-heavy { background: #dbeafe; color: #1e40af; }
        .badge-snack { background: #fce7f3; color: #9d174d; }
        .badge-drink { background: #dcfce7; color: #166534; }
        .badge-sweet { background: #ffedd5; color: #9a3412; }

        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-mini { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: white; }
        .btn-edit { background: #f59e0b; }
        .btn-del { background: #ef4444; }
        .btn-offer { background: #10b981; }
        .btn-cancel-offer { background: #6b7280; }
        
        .alert { padding: 15px; border-radius: 10px; margin-top: 20px; display: none; text-align: center; font-weight: 600; background: #dcfce7; color: #166534; }
        .note { font-size: 0.8rem; color: #64748b; margin-top: 5px; }
        .error-message { color: #ef4444; font-size: 0.9rem; margin-top: 5px; display: none; }
        .warning-message { color: #f97316; font-size: 0.9rem; margin-top: 5px; display: none; }

        /* Floating chat button */
        .chat-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4361ee;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 300;
            transition: transform 0.2s;
        }
        .chat-float:hover { transform: scale(1.1); }

        /* Chat popup – two columns, no overlay */
        .chat-popup {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 600px;
            height: 450px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            display: none;
            z-index: 350;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .chat-popup.show { display: flex; }
        .chat-sidebar {
            width: 200px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-sidebar h4 { margin-bottom: 10px; color: #475569; }
        .buyer-item {
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            background: white;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .buyer-item:hover { background: #e2e8f0; }
        .buyer-item.selected { background: #4361ee; color: white; border-color: #4361ee; }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 15px;
            background: #4361ee;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { font-size: 1rem; font-weight: 600; }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9f9f9;
        }
        .chat-msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .chat-buyer {
            align-self: flex-start;
            background: #e9e9e9;
            color: #333;
        }
        .chat-seller {
            align-self: flex-end;
            background: #4361ee;
            color: white;
        }
        .chat-msg small {
            font-size: 0.7rem;
            display: block;
            margin-bottom: 2px;
            opacity: 0.8;
        }
        .chat-input-area {
            padding: 10px;
            border-top: 1px solid #eee;
            display: flex;
        }
        .chat-input-area input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }
        .chat-input-area button {
            margin-left: 8px;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            cursor: pointer;
        }
        .chat-clear {
            background: #ef4444;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 5px;
        }
        @media(max-width:768px){ .chat-popup{ width:95%; right:2.5%; left:2.5%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-user-tie"></i> Seller Admin Panel</h2>
        <div class="section-title">📦 Input Product</div>
        <input type="hidden" id="editId">
        
        <div class="form-grid">
            <div class="form-group"><label>Store Name</label><input type="text" id="sName" placeholder="Contoh: Dapur Bu Dewi"></div>
            <div class="form-group"><label>WhatsApp Contact</label><input type="text" id="sContact" placeholder="+628xxx"></div>
            <div class="form-group"><label>Item Name</label><input type="text" id="sItem" placeholder="Contoh: Nasi Goreng Spesial"></div>
            <div class="form-group"><label>Category</label>
                <select id="sCategory">
                    <option value="" disabled selected>-- Select --</option>
                    <option value="Heavy Meal">🍛 Heavy Meal</option>
                    <option value="Light Snack">🍟 Light Snack</option>
                    <option value="Beverage">🥤 Beverage</option>
                    <option value="Dessert">🍰 Dessert</option>
                </select>
            </div>
            <div class="form-group"><label>Base Price (IDR)</label><input type="number" id="sPrice" placeholder="Contoh: 15000"></div>
            <div class="form-group"><label>Discount (%)</label><input type="number" id="sDiscount" min="0" max="100" placeholder="0 = no discount"></div>
        </div>

        <div class="upload-row">
            <div class="form-group">
                <label>Product Photo</label>
                <div class="file-upload" onclick="document.getElementById('sImgInput').click()"><i class="fas fa-cloud-upload-alt"></i> Insert Image</div>
                <input type="file" id="sImgInput" style="display:none" accept="image/*" onchange="handleImageUpload()">
                <input type="hidden" id="sImgBase64"> 
            </div>
            <div class="form-group">
                <label>Short Video (optional, max 50MB)</label>
                <div class="file-upload" onclick="document.getElementById('sVideoInput').click()"><i class="fas fa-video"></i> Insert Video</div>
                <input type="file" id="sVideoInput" style="display:none" accept="video/mp4,video/webm,video/ogg" onchange="handleVideoUpload()">
                <div class="note">Video upload via Cloudinary (free).</div>
            </div>
        </div>

        <div class="preview-row">
            <img id="imgPreview" class="preview-img" alt="Image Preview">
            <video id="videoPreview" class="preview-video" controls></video>
        </div>

        <div id="uploadError" class="error-message"></div>
        <div id="uploadWarning" class="warning-message"></div>

        <button id="btnPublish" class="btn-submit" onclick="saveProduct()"><i class="fas fa-plus-circle"></i> Add to Catalog</button>
        <button id="btnCancel" class="btn-submit btn-cancel" onclick="resetForm()"><i class="fas fa-times"></i> Cancel</button>
        <div id="msgSuccess" class="alert">✅ Saved Successfully! Image Compressed.</div>
    </div>

    <div class="card">
        <div class="section-title">📋 Live Catalog</div>
        <div class="table-responsive">
            <table id="catalogTable">
                <thead><tr><th width="80">Img</th><th>Item</th><th>Category</th><th>Price</th><th>Action</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Floating Chat Button -->
<div class="chat-float" onclick="toggleChatPopup()"><i class="fas fa-comment"></i></div>

<!-- Chat Popup -->
<div class="chat-popup" id="chatPopup">
    <div class="chat-sidebar">
        <h4>Buyers</h4>
        <div id="buyerList"></div>
    </div>
    <div class="chat-main">
        <div class="chat-header">
            <h3><i class="fas fa-comments"></i> Chat</h3>
            <i class="fas fa-times" onclick="toggleChatPopup()"></i>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
            <button class="chat-clear" onclick="clearChat()">Clear</button>
        </div>
    </div>
</div>

<script>
    const CLOUDINARY_CLOUD_NAME = 'dhdhpy0lu';
    const CLOUDINARY_UPLOAD_PRESET = 'Malvin_DatabaseForWAD';
    const firebaseConfig = {
        apiKey: "AIzaSyD7FOAqhpJNVq7J6iYBcknOqWdedCIYQvQ",
        authDomain: "kingstenderapp.firebaseapp.com",
        projectId: "kingstenderapp",
        storageBucket: "kingstenderapp.firebasestorage.app",
        messagingSenderId: "264140729392",
        appId: "1:264140729392:web:01064f3b288e653a99d1f5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // IMAGE
    function handleImageUpload() {
        const file = document.getElementById('sImgInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * (MAX_WIDTH / img.width);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                document.getElementById('sImgBase64').value = canvas.toDataURL('image/jpeg',0.6);
                document.getElementById('imgPreview').src = canvas.toDataURL('image/jpeg',0.6);
                document.getElementById('imgPreview').style.display = 'block';
            };
        };
    }

    let videoFile = null;
    function handleVideoUpload() {
        const file = document.getElementById('sVideoInput').files[0];
        if (!file) return;
        if (file.size > 50*1024*1024) {
            document.getElementById('uploadError').textContent = 'Max 50MB';
            document.getElementById('uploadError').style.display = 'block';
            document.getElementById('sVideoInput').value = '';
            return;
        }
        document.getElementById('uploadError').style.display = 'none';
        videoFile = file;
        document.getElementById('videoPreview').src = URL.createObjectURL(file);
        document.getElementById('videoPreview').style.display = 'block';
    }

    // READ PRODUCTS
    db.collection("products").orderBy("timestamp","desc").onSnapshot(snap => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (snap.empty) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No products yet.</td></tr>';
            return;
        }
        snap.forEach(doc => {
            const d = doc.data();
            const id = doc.id;
            const img = d.imageUrl ? `<img src="${d.imageUrl}" class="thumb-small">` : '<div class="thumb-small" style="background:#eee;">No Img</div>';
            const videoIcon = d.videoUrl ? ' <i class="fas fa-video" style="color:#3b82f6;"></i>' : '';
            let badge = 'badge-heavy';
            if (d.category === 'Light Snack') badge = 'badge-snack';
            else if (d.category === 'Beverage') badge = 'badge-drink';
            else if (d.category === 'Dessert') badge = 'badge-sweet';
            const offerBtn = d.offer ? `<button class="btn-mini btn-cancel-offer" onclick="cancelOffer('${id}')"><i class="fas fa-ban"></i></button>` : `<button class="btn-mini btn-offer" onclick="makeOffer('${id}')"><i class="fas fa-bolt"></i></button>`;
            const row = `<tr><td>${img}</td><td><b>${d.items[0]}</b>${videoIcon}<br><small>${d.sellerName}</small></td><td><span class="badge ${badge}">${d.category}</span></td><td>Rp ${d.basePrice.toLocaleString()} ${d.discount?`(-${d.discount}%)`:''}</td><td><div class="action-btns"><button class="btn-mini btn-edit" onclick="editMode('${id}','${d.sellerName}','${d.contact}','${d.items[0]}','${d.category}',${d.basePrice},${d.discount||0})"><i class="fas fa-edit"></i></button>${offerBtn}<button class="btn-mini btn-del" onclick="deleteProduct('${id}','${d.items[0]}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
            tbody.innerHTML += row;
        });
    });

    function cancelOffer(id) {
        if (confirm('Remove instant offer?')) db.collection('products').doc(id).update({ offer: firebase.firestore.FieldValue.delete() });
    }
    function makeOffer(id) {
        db.collection('products').doc(id).update({ offer: firebase.firestore.FieldValue.serverTimestamp() });
    }

    async function uploadVideoToCloudinary(file) {
        const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`;
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        const res = await fetch(url, { method: 'POST', body: fd });
        if (!res.ok) throw new Error((await res.json()).error?.message || 'Upload failed');
        return (await res.json()).secure_url;
    }

    async function saveProduct() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('sName').value.trim();
        const contact = document.getElementById('sContact').value.trim();
        const item = document.getElementById('sItem').value.trim();
        const cat = document.getElementById('sCategory').value;
        const price = document.getElementById('sPrice').value;
        const disc = document.getElementById('sDiscount').value;
        const imgBase64 = document.getElementById('sImgBase64').value;
        const video = document.getElementById('sVideoInput').files[0];
        if (!name || !item || !price) return alert('Fill required fields');
        if (!imgBase64 && !id) return alert('Image required');
        const btn = document.getElementById('btnPublish');
        const orig = btn.innerHTML;
        btn.innerHTML = 'Saving...';
        btn.disabled = true;
        try {
            const data = {
                sellerName: name,
                contact,
                items: [item],
                category: cat,
                basePrice: parseInt(price),
                timestamp: new Date()
            };
            if (id) {
                if (disc && parseInt(disc) > 0) data.discount = parseInt(disc);
                else data.discount = firebase.firestore.FieldValue.delete();
            } else {
                if (disc && parseInt(disc) > 0) data.discount = parseInt(disc);
            }
            if (imgBase64) data.imageUrl = imgBase64;
            if (video) {
                try {
                    const videoUrl = await uploadVideoToCloudinary(video);
                    data.videoUrl = videoUrl;
                } catch (e) {
                    document.getElementById('uploadWarning').textContent = 'Video failed, saved without video: ' + e.message;
                    document.getElementById('uploadWarning').style.display = 'block';
                }
            }
            if (id) await db.collection('products').doc(id).set(data, { merge: true });
            else await db.collection('products').add({ ...data, sellerId: 'S-'+Date.now() });
            doneSaving();
        } catch (e) {
            alert('Error: '+e.message);
            btn.innerHTML = orig;
            btn.disabled = false;
        }
    }

    function deleteProduct(id, name) {
        if (confirm('Delete '+name+'?')) db.collection('products').doc(id).delete();
    }
    function editMode(id, name, contact, item, cat, price, disc) {
        document.getElementById('editId').value = id;
        document.getElementById('sName').value = name;
        document.getElementById('sContact').value = contact;
        document.getElementById('sItem').value = item;
        document.getElementById('sCategory').value = cat;
        document.getElementById('sPrice').value = price;
        document.getElementById('sDiscount').value = disc;
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('sImgBase64').value = '';
        document.getElementById('videoPreview').style.display = 'none';
        document.getElementById('sVideoInput').value = '';
        videoFile = null;
        document.getElementById('btnPublish').innerHTML = 'Update Product';
        document.getElementById('btnPublish').classList.add('btn-update');
        document.getElementById('btnCancel').style.display = 'block';
    }
    function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('sName').value = '';
        document.getElementById('sContact').value = '';
        document.getElementById('sItem').value = '';
        document.getElementById('sCategory').value = '';
        document.getElementById('sPrice').value = '';
        document.getElementById('sDiscount').value = '';
        document.getElementById('sImgBase64').value = '';
        document.getElementById('sImgInput').value = '';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('sVideoInput').value = '';
        document.getElementById('videoPreview').style.display = 'none';
        videoFile = null;
        document.getElementById('btnPublish').innerHTML = '<i class="fas fa-plus-circle"></i> Add to Catalog';
        document.getElementById('btnPublish').classList.remove('btn-update');
        document.getElementById('btnCancel').style.display = 'none';
        document.getElementById('btnPublish').disabled = false;
    }
    function doneSaving() {
        document.getElementById('msgSuccess').style.display = 'block';
        setTimeout(() => document.getElementById('msgSuccess').style.display = 'none', 3000);
        resetForm();
    }

    // ========== CHAT ==========
    let currentBuyer = null;
    function toggleChatPopup() {
        document.getElementById('chatPopup').classList.toggle('show');
        if (document.getElementById('chatPopup').classList.contains('show')) loadBuyers();
    }
    function loadBuyers() {
        db.collection('chats').get().then(snap => {
            const buyers = new Set();
            snap.forEach(d => buyers.add(d.data().buyerId));
            renderBuyerList(Array.from(buyers));
        }).catch(err => console.error("Error loading buyers:", err));
    }
    function renderBuyerList(buyers) {
        const div = document.getElementById('buyerList');
        div.innerHTML = '';
        buyers.forEach(b => {
            const el = document.createElement('div');
            el.className = 'buyer-item' + (b === currentBuyer ? ' selected' : '');
            el.textContent = b;
            el.onclick = () => selectBuyer(b);
            div.appendChild(el);
        });
    }
    function selectBuyer(b) {
        currentBuyer = b;
        // Refresh list to highlight selected
        const allItems = document.querySelectorAll('.buyer-item');
        allItems.forEach(item => item.classList.remove('selected'));
        document.querySelectorAll('.buyer-item').forEach(item => { if (item.textContent === b) item.classList.add('selected'); });
        listenToChat(b);
    }
    function listenToChat(buyerId) {
        db.collection('chats').where('buyerId','==',buyerId).orderBy('timestamp').onSnapshot(snap => {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data();
                const div = document.createElement('div');
                div.className = m.sender === 'buyer' ? 'chat-msg chat-buyer' : 'chat-msg chat-seller';
                div.innerHTML = `<small>${m.sender}</small><br>${m.message}`;
                chatDiv.appendChild(div);
            });
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }, error => {
            console.error("Chat listener error:", error);
            if (error.code === 'failed-precondition') {
                alert("Please create the required Firestore index. Check the console for the link.");
            }
        });
    }
    function sendChatMessage() {
        if (!currentBuyer) return alert('Select a buyer first');
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        db.collection('chats').add({ buyerId: currentBuyer, sender: 'seller', message: msg, timestamp: firebase.firestore.FieldValue.serverTimestamp() })
            .then(() => input.value = '')
            .catch(err => alert(err.message));
    }
    function clearChat() {
        if (!currentBuyer) return alert('Select a buyer first');
        if (!confirm('Clear all messages for this buyer?')) return;
        db.collection('chats').where('buyerId','==',currentBuyer).get()
            .then(snap => {
                const batch = db.batch();
                snap.docs.forEach(d => batch.delete(d.ref));
                return batch.commit();
            }).then(() => alert('Chat cleared'))
            .catch(err => alert(err.message));
    }
</script>
</body>
</html>
